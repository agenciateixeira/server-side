<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTX - Atualizar Status de Leads</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .config-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .config-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .config-row label {
            font-weight: 600;
            color: #333;
            min-width: 120px;
            display: flex;
            align-items: center;
        }

        .config-row input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .leads-list {
            margin-top: 30px;
        }

        .lead-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .lead-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .lead-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .lead-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-novo { background: #e3f2fd; color: #1976d2; }
        .status-contatado { background: #fff3e0; color: #f57c00; }
        .status-qualificado { background: #f3e5f5; color: #7b1fa2; }
        .status-reuniao_agendada { background: #e8f5e9; color: #388e3c; }
        .status-fechado { background: #c8e6c9; color: #2e7d32; }
        .status-perdido { background: #ffebee; color: #c62828; }

        .lead-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item {
            font-size: 14px;
        }

        .info-label {
            color: #666;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
        }

        .lead-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-qualificar {
            background: #9c27b0;
            color: white;
        }

        .btn-qualificar:hover {
            background: #7b1fa2;
        }

        .btn-agendar {
            background: #4caf50;
            color: white;
        }

        .btn-agendar:hover {
            background: #388e3c;
        }

        .btn-fechar {
            background: #2e7d32;
            color: white;
        }

        .btn-fechar:hover {
            background: #1b5e20;
        }

        .btn-perder {
            background: #f44336;
            color: white;
        }

        .btn-perder:hover {
            background: #c62828;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 GTX - Gerenciador de Leads</h1>
        <p class="subtitle">Atualize o status dos leads para disparar eventos no Meta CAPI</p>

        <!-- Configuração -->
        <div class="config-section">
            <h3 style="margin-bottom: 15px;">⚙️ Configuração</h3>
            <div class="config-row">
                <label>Supabase URL:</label>
                <input type="text" id="supabaseUrl" placeholder="https://xxx.supabase.co">
            </div>
            <div class="config-row">
                <label>Service Role Key:</label>
                <input type="password" id="supabaseKey" placeholder="eyJhbGci...">
            </div>
            <button class="btn-primary" onclick="carregarLeads()">🔄 Carregar Leads</button>
        </div>

        <!-- Lista de Leads -->
        <div id="leadsList" class="leads-list">
            <div class="empty-state">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                    <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
                </svg>
                <h3>Nenhum lead carregado</h3>
                <p>Configure as credenciais acima e clique em "Carregar Leads"</p>
            </div>
        </div>
    </div>

    <!-- Modal para Fechar Negócio -->
    <div id="modalFechar" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">💰 Fechar Negócio</h2>
            <input type="number" id="valorVenda" class="modal-input" placeholder="Valor da venda (R$)" step="0.01">
            <div class="modal-buttons">
                <button style="background: #e0e0e0; color: #333;" onclick="fecharModal()">Cancelar</button>
                <button style="background: #2e7d32; color: white;" onclick="confirmarFechamento()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        let CONFIG = {
            supabaseUrl: localStorage.getItem('gtx_supabase_url') || '',
            supabaseKey: localStorage.getItem('gtx_supabase_key') || ''
        };

        let currentLeadId = null;

        // Carregar configurações salvas
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('supabaseUrl').value = CONFIG.supabaseUrl;
            document.getElementById('supabaseKey').value = CONFIG.supabaseKey;

            if (CONFIG.supabaseUrl && CONFIG.supabaseKey) {
                carregarLeads();
            }
        });

        // Salvar configurações
        function salvarConfig() {
            CONFIG.supabaseUrl = document.getElementById('supabaseUrl').value;
            CONFIG.supabaseKey = document.getElementById('supabaseKey').value;

            localStorage.setItem('gtx_supabase_url', CONFIG.supabaseUrl);
            localStorage.setItem('gtx_supabase_key', CONFIG.supabaseKey);
        }

        // Carregar leads do Supabase
        async function carregarLeads() {
            salvarConfig();

            if (!CONFIG.supabaseUrl || !CONFIG.supabaseKey) {
                alert('Configure as credenciais primeiro!');
                return;
            }

            const leadsList = document.getElementById('leadsList');
            leadsList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando leads...</p></div>';

            try {
                const response = await fetch(`${CONFIG.supabaseUrl}/rest/v1/leads?order=created_at.desc&limit=50`, {
                    headers: {
                        'apikey': CONFIG.supabaseKey,
                        'Authorization': `Bearer ${CONFIG.supabaseKey}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Erro ao buscar leads');
                }

                const leads = await response.json();

                if (leads.length === 0) {
                    leadsList.innerHTML = `
                        <div class="empty-state">
                            <h3>Nenhum lead encontrado</h3>
                            <p>Aguardando primeiros leads...</p>
                        </div>
                    `;
                    return;
                }

                renderLeads(leads);

            } catch (error) {
                console.error('Erro:', error);
                leadsList.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Erro ao carregar leads</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Renderizar lista de leads
        function renderLeads(leads) {
            const leadsList = document.getElementById('leadsList');

            const html = leads.map(lead => {
                const statusClass = `status-${lead.status || 'novo'}`;
                const statusLabel = {
                    'novo': 'Novo',
                    'contatado': 'Contatado',
                    'qualificado': 'Qualificado',
                    'reuniao_agendada': 'Reunião Agendada',
                    'fechado': 'Fechado',
                    'perdido': 'Perdido'
                }[lead.status] || 'Novo';

                const data = new Date(lead.created_at).toLocaleString('pt-BR');

                return `
                    <div class="lead-card">
                        <div class="lead-header">
                            <div class="lead-name">${lead.nome || 'Sem nome'}</div>
                            <div class="lead-status ${statusClass}">${statusLabel}</div>
                        </div>

                        <div class="lead-info">
                            <div class="info-item">
                                <span class="info-label">📧 Email:</span>
                                <span class="info-value">${lead.email || 'Não informado'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">📱 Telefone:</span>
                                <span class="info-value">${lead.telefone || 'Não informado'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">📅 Data:</span>
                                <span class="info-value">${data}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">🔖 Origem:</span>
                                <span class="info-value">${lead.origem || 'Não informado'}</span>
                            </div>
                            ${lead.valor_venda ? `
                            <div class="info-item">
                                <span class="info-label">💰 Valor:</span>
                                <span class="info-value">R$ ${parseFloat(lead.valor_venda).toFixed(2)}</span>
                            </div>
                            ` : ''}
                        </div>

                        <div class="lead-actions">
                            ${lead.status !== 'qualificado' && lead.status !== 'reuniao_agendada' && lead.status !== 'fechado' ? `
                                <button class="btn btn-qualificar" onclick="atualizarStatus('${lead.id}', 'qualificado')">
                                    ✅ Qualificar
                                </button>
                            ` : ''}

                            ${lead.status === 'qualificado' || lead.status === 'reuniao_agendada' ? `
                                <button class="btn btn-agendar" onclick="atualizarStatus('${lead.id}', 'reuniao_agendada')">
                                    📅 Agendar Reunião
                                </button>
                            ` : ''}

                            ${lead.status !== 'fechado' && lead.status !== 'perdido' ? `
                                <button class="btn btn-fechar" onclick="abrirModalFechar('${lead.id}')">
                                    💰 Fechar Negócio
                                </button>
                            ` : ''}

                            ${lead.status !== 'perdido' && lead.status !== 'fechado' ? `
                                <button class="btn btn-perder" onclick="atualizarStatus('${lead.id}', 'perdido')">
                                    ❌ Marcar como Perdido
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            leadsList.innerHTML = html;
        }

        // Atualizar status do lead
        async function atualizarStatus(leadId, novoStatus) {
            if (!confirm(`Confirmar alteração de status para "${novoStatus}"?`)) {
                return;
            }

            try {
                const response = await fetch(`${CONFIG.supabaseUrl}/rest/v1/leads?id=eq.${leadId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': CONFIG.supabaseKey,
                        'Authorization': `Bearer ${CONFIG.supabaseKey}`
                    },
                    body: JSON.stringify({
                        status: novoStatus,
                        updated_at: new Date().toISOString()
                    })
                });

                if (!response.ok) {
                    throw new Error('Erro ao atualizar status');
                }

                alert('✅ Status atualizado com sucesso!');
                carregarLeads();

            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro ao atualizar status: ' + error.message);
            }
        }

        // Abrir modal para fechar negócio
        function abrirModalFechar(leadId) {
            currentLeadId = leadId;
            document.getElementById('modalFechar').classList.add('active');
            document.getElementById('valorVenda').value = '';
            document.getElementById('valorVenda').focus();
        }

        // Fechar modal
        function fecharModal() {
            document.getElementById('modalFechar').classList.remove('active');
            currentLeadId = null;
        }

        // Confirmar fechamento
        async function confirmarFechamento() {
            const valor = parseFloat(document.getElementById('valorVenda').value);

            if (!valor || valor <= 0) {
                alert('Digite um valor válido!');
                return;
            }

            try {
                const response = await fetch(`${CONFIG.supabaseUrl}/rest/v1/leads?id=eq.${currentLeadId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': CONFIG.supabaseKey,
                        'Authorization': `Bearer ${CONFIG.supabaseKey}`
                    },
                    body: JSON.stringify({
                        status: 'fechado',
                        valor_venda: valor,
                        updated_at: new Date().toISOString()
                    })
                });

                if (!response.ok) {
                    throw new Error('Erro ao fechar negócio');
                }

                alert(`✅ Negócio fechado com sucesso!\nValor: R$ ${valor.toFixed(2)}`);
                fecharModal();
                carregarLeads();

            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro ao fechar negócio: ' + error.message);
            }
        }
    </script>
</body>
</html>
